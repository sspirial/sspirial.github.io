baseURL: https://sspirial.github.io/
languageCode: en-us
title: Munubi Emmanuel | Full-Stack Software Developer
theme: ["PaperMod"]
copyright: "© 2026 Munubi Emmanuel"

# Google Analytics 4 Measurement ID
googleAnalytics: G-8H88BCSW5G

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 15

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Projects
          url: projects/
          weight: 10
        - name: About
          url: about/
          weight: 20
        - name: Blog & Logs
          url: posts/
          weight: 30
        - name: Search
          url: search/
          weight: 40
        - name: LinkedIn
          url: https://www.linkedin.com/in/emmanuel-munubi/
          weight: 50


outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Full-Stack Software Developer specializing in React, Node.js, PostgreSQL, API integrations, and internal systems."
  author: Munubi Emmanuel

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  images: ["images/c.png"]

  # Giscus Comments Configuration
  # Get your values from https://giscus.app
  giscus:
    repo: "sspirial/sspirial.github.io"
    repoID: "R_kgDONxyq_Q"  # Get from https://giscus.app
    category: "Announcements"
    categoryID: "DIC_kwDONxyq_c4CwWQL"  # Get from https://giscus.app
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"
    loading: "lazy"

  profileMode:
    enabled: true
    title: "Emmanuel Munubi"
    subtitle: "Full-Stack Software Developer"
    description: "Building reliable web applications, internal tools, API integrations, and database systems with React, Node.js, PostgreSQL & Docker."
    imageUrl: "https://avatars.githubusercontent.com/u/96319511?v=4"
    imageTitle: "Emmanuel Munubi"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: Featured Projects
        url: projects/
      - name: About & Skills
        url: about/
      - name: GitHub
        url: https://github.com/sspirial
      - name: LinkedIn
        url: https://www.linkedin.com/in/emmanuel-munubi/

  homeInfoParams:
    Title: "Emmanuel Munubi"
    Content: >
      Full-Stack Developer | React • Node.js • PostgreSQL • Docker • Python

      - Building robust internal software tools, dashboards, and automated API integrations.
      
      - Focused on writing clean, maintainable code that solves real operational challenges.

  socialIcons:
    - name: github
      title: View GitHub Repositories
      url: "https://github.com/sspirial"
    - name: linkedin
      title: Connect on LinkedIn
      url: "https://www.linkedin.com/in/emmanuel-munubi/"
    - name: X
      title: Follow on X/Twitter
      url: "https://x.com/MunubiEmmanuel"


